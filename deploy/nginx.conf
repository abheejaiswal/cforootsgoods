# Reverse proxy + TLS termination for the RootsGoods app.
# Replace server_name and certificate paths with your own.

# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name finance.example.com;   # <-- change
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name finance.example.com;    # <-- change

    ssl_certificate     /etc/nginx/certs/fullchain.pem;   # <-- your cert
    ssl_certificate_key /etc/nginx/certs/privkey.pem;     # <-- your key
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Optional: restrict to office IPs (defence in depth). Uncomment + edit.
    # allow 203.0.113.0/24;
    # deny all;

    client_max_body_size 8m;   # allow statement uploads
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location / {
        proxy_pass         http://app:3000;   # 'app' = compose service; use 127.0.0.1:3000 if not using Docker
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
